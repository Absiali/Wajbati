<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وجبتي - طلب الوجبات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">🍽️ وجبتي</span>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-light" id="adminToggle">لوحة الإدارة</button>
                <button class="btn btn-outline-light" id="userToggle" style="display:none;">واجهة المريض</button>
            </div>
        </div>
    </nav>

    <!-- واجهة المريض -->
    <div id="userInterface" class="container mt-4">
        <h2 class="text-center mb-4">اطلب وجباتك للغد</h2>
        
        <div class="row mb-4">
            <div class="col-md-12">
                <label class="form-label fw-bold">اختر التاريخ:</label>
                <input type="date" id="mealDate" class="form-control" style="max-width: 200px;">
            </div>
        </div>

        <!-- الوجبات الثلاث -->
        <div class="row">
            <!-- وجبة الفطور -->
            <div class="col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-warning text-dark">
                        <h5>🌅 وجبة الفطور</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">اختر الصنف:</label>
                            <select id="breakfastMeal" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">اختر المشروب:</label>
                            <select id="breakfastDrink" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الفاكهة:</label>
                            <select id="breakfastFruit" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- وجبة الغداء -->
            <div class="col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-success text-white">
                        <h5>☀️ وجبة الغداء</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">اختر الصنف:</label>
                            <select id="lunchMeal" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">اختر المشروب:</label>
                            <select id="lunchDrink" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الفاكهة:</label>
                            <select id="lunchFruit" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- وجبة العشاء -->
            <div class="col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-info text-white">
                        <h5>🌙 وجبة العشاء</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">اختر الصنف:</label>
                            <select id="dinnerMeal" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">اختر المشروب:</label>
                            <select id="dinnerDrink" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الفاكهة:</label>
                            <select id="dinnerFruit" class="form-select">
                                <option value="">-- اختر --</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12 text-center">
                <button class="btn btn-primary btn-lg" id="submitOrder">تأكيد الطلب</button>
            </div>
        </div>
    </div>

    <!-- لوحة الإدارة -->
    <div id="adminInterface" style="display:none;" class="container mt-4">
        <h2 class="text-center mb-4">لوحة إدارة الوجبات</h2>
        
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="mealsTab" data-bs-toggle="tab" data-bs-target="#mealsPanel">🍽️ الوجبات</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="drinksTab" data-bs-toggle="tab" data-bs-target="#drinksPanel">🥤 المشروبات</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="fruitsTab" data-bs-toggle="tab" data-bs-target="#fruitsPanel">🍎 الفواكه</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="ordersTab" data-bs-toggle="tab" data-bs-target="#ordersPanel">📋 الطلبات</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- لسان الوجبات -->
            <div id="mealsPanel" class="tab-pane fade show active">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>إضافة وجبة جديدة</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <input type="text" id="newMealName" class="form-control" placeholder="اسم الوجبة">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" id="addMealBtn">➕ إضافة</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>الوجبات المتاحة</h5>
                    </div>
                    <div class="card-body" id="mealsList">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                </div>
            </div>

            <!-- لسان المشروبات -->
            <div id="drinksPanel" class="tab-pane fade">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>إضافة مشروب جديد</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <input type="text" id="newDrinkName" class="form-control" placeholder="اسم المشروب">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" id="addDrinkBtn">➕ إضافة</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>المشروبات المتاحة</h5>
                    </div>
                    <div class="card-body" id="drinksList">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                </div>
            </div>

            <!-- لسان الفواكه -->
            <div id="fruitsPanel" class="tab-pane fade">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>إضافة فاكهة جديدة</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <input type="text" id="newFruitName" class="form-control" placeholder="اسم الفاكهة">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" id="addFruitBtn">➕ إضافة</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>الفواكه المتاحة</h5>
                    </div>
                    <div class="card-body" id="fruitsList">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                </div>
            </div>

            <!-- لسان الطلبات -->
            <div id="ordersPanel" class="tab-pane fade">
                <div class="card">
                    <div class="card-header">
                        <h5>الطلبات المسجلة</h5>
                    </div>
                    <div class="card-body" id="ordersList">
                        <!-- يتم ملؤها بـ JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
