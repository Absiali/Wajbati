<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اختيار الوجبات</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- بيانات المريض -->
    <div class="box">
        <h2>🧑‍⚕️ بيانات المريض</h2>

        <input type="text" id="patient-name" placeholder="اسم المريض">
        <input type="number" id="room-number" placeholder="رقم الغرفة">
    </div>

    <!-- اختيار الوجبة -->
    <div class="box">
        <h2>🍽️ اختر الوجبة</h2>

        <div style="text-align:center;">
            <img src="../img/breakfast.png" class="meal-icon" alt="فطور">
            <img src="../img/lunch.png" class="meal-icon" alt="غداء">
            <img src="../img/dinner.png" class="meal-icon" alt="عشاء">
        </div>
    </div>

    <!-- عرض الأصناف -->
    <div id="meal-options" class="meal-options" style="display:none;">
        <h3 id="meal-title"></h3>
        <div id="options-list"></div>
    </div>

    <script src="../js/app.js"></script>

</body>
</html>
