<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>وجبتي - المريض</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</head>

<body class="patient-page">

    <h2 class="page-title">اختيار الوجبة</h2>

    <!-- قسم الأيقونات -->
    <div class="meal-icons">
        <img src="assets/meal-icons/breakfast.png" alt="فطور" class="meal-icon">
        <img src="assets/meal-icons/lunch.png" alt="غداء" class="meal-icon">
        <img src="assets/meal-icons/dinner-night.png" alt="عشاء" class="meal-icon">
    </div>

    <!-- بطاقات الوجبات -->
    <div class="meal-card">
        <h3>الفطور</h3>
        <button class="order-btn">اطلب الآن</button>
    </div>

    <div class="meal-card">
        <h3>الغداء</h3>
        <button class="order-btn">اطلب الآن</button>
    </div>

    <div class="meal-card">
        <h3>العشاء</h3>
        <button class="order-btn">اطلب الآن</button>
    </div>

</body>
</html>
